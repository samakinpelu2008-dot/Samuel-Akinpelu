<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akinpelu Samuel | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:'Roboto',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* Scroll progress bar */
#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  background:#00bfff;
  width:0%;
  z-index:9999;
}

/* Back to top */
#backTop{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#00bfff;
  color:#000;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
  display:none;
  z-index:999;
}

/* Navigation */
nav{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
}

nav a{
  margin:0 15px;
  color:#00bfff;
  font-weight:bold;
  text-decoration:none;
}

nav a.active{
  color:#fff;
}

/* Hero */
header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

header h1{
  font-size:3rem;
  color:#00bfff;
}

header p{
  margin-top:10px;
  color:#ccc;
}

.profile-pic{
  width:140px;
  height:140px;
  border-radius:50%;
  margin-top:20px;
  border:4px solid #00bfff;
  object-fit:cover;
  animation:float 5s ease-in-out infinite;
  box-shadow:0 0 20px #00bfff;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.buttons{
  margin-top:20px;
}

.buttons button{
  background:#00bfff;
  border:none;
  padding:10px 20px;
  margin:0 10px;
  font-weight:bold;
  border-radius:5px;
  cursor:pointer;
}

/* Sections */
section{
  padding:80px 10%;
}

section h2{
  margin-bottom:30px;
  color:#00bfff;
}

/* Project cards */
.project-card{
  background:#111;
  padding:20px;
  margin-bottom:20px;
  border-radius:8px;
  transition:0.3s;
}

.project-card:hover{
  transform:translateY(-5px);
}

.project-card button{
  margin-top:10px;
  padding:8px 15px;
  background:#00bfff;
  border:none;
  font-weight:bold;
  border-radius:5px;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:30px;
  width:80%;
  max-width:600px;
  border-radius:10px;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  cursor:pointer;
}

/* View In Card */
.view-in-card{
  width:50%;
  float:right;
  margin-top:20px;
}

.view-in-card a{
  display:block;
  background:#00bfff;
  color:#000;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  text-align:center;
  text-decoration:none;
}

@media(max-width:600px){
  .view-in-card{
    width:100%;
    float:none;
  }
}
</style>
</head>
<body>

<div id="progressBar"></div>
<div id="backTop"><i class="fas fa-arrow-up"></i></div>

<nav>
  <a href="#home" class="nav-link active">Home</a>
  <a href="#projects" class="nav-link">Projects</a>
  <a href="#contact" class="nav-link">Contact</a>
</nav>

<header id="home">
  <h1>Akinpelu Samuel</h1>
  <p>Software Builder | Tech Visionary</p>

  <img src="https://i.ibb.co/BKL4k8Zm/1000223408.png" 
       alt="Akinpelu Samuel" 
       class="profile-pic">

  <div class="buttons">
    <button onclick="location.href='#projects'">View Projects</button>
    <button onclick="location.href='#contact'">Contact</button>
  </div>
</header>

<section id="projects">
  <h2>My Projects</h2>

  <div class="project-card">
    <h3>Sammy Chat</h3>
    <p>Modern chat application with phone authentication.</p>
    <button onclick="openModal('modal1')">View Details</button>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: samuel@email.com</p>
</section>

<!-- Modal -->
<div id="modal1" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('modal1')">&times;</span>
    <h3>Sammy Chat</h3>
    <p>Full real-time chat system with authentication and AI integration.</p>

    <div class="view-in-card">
      <a href="#" target="_blank">VIEW IN</a>
    </div>
  </div>
</div>

<script>
// Nav highlight
const sections = document.querySelectorAll("section, header");
const navLinks = document.querySelectorAll(".nav-link");

window.addEventListener("scroll", () => {
  let current = "";
  sections.forEach(section => {
    const sectionTop = section.offsetTop - 100;
    if (pageYOffset >= sectionTop) {
      current = section.getAttribute("id");
    }
  });

  navLinks.forEach(link => {
    link.classList.remove("active");
    if (link.getAttribute("href") === "#" + current) {
      link.classList.add("active");
    }
  });

  // Progress bar
  const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById("progressBar").style.width = (winScroll / height) * 100 + "%";

  // Back to top
  if(winScroll > 300){
    document.getElementById("backTop").style.display = "block";
  } else {
    document.getElementById("backTop").style.display = "none";
  }
});

document.getElementById("backTop").onclick = function(){
  window.scrollTo({top:0, behavior:'smooth'});
};

function openModal(id){
  document.getElementById(id).style.display="flex";
}

function closeModal(id){
  document.getElementById(id).style.display="none";
}

window.onclick = function(event){
  const modal = document.querySelector(".modal");
  if(event.target == modal){
    modal.style.display = "none";
  }
};
</script>

</body>
</html>
